<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上課程報名系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 50px 0; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 form-container">
            <h2 class="text-center mb-4">課程報名表單</h2>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">電子郵件</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">聯絡電話</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">選擇課程</label>
                    <select name="course" class="form-select" required>
                        <option value="">請選擇課程...</option>
                        <option value="Python程式設計">Python 程式設計</option>
                        <option value="數位行銷入門">數位行銷入門</option>
                        <option value="平面設計基礎">平面設計基礎</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">備註</label>
                    <textarea name="note" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">提交報名</button>
            </form>
            <div id="responseMsg" class="mt-3 text-center" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxY-7nN1VstyU25aZ_9i8v1zBTRJJSWMa3z7HNSExJlBLcninn85MSHKLFeLyDL_lCT/exec'; // 這裡貼上你的網頁應用程式 URL
    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMsg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = '處理中...';

        // 整理資料
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // 使用 fetch 送出資料
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // 重要：避免 CORS 問題
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        })
        .then(() => {
            msg.style.display = 'block';
            msg.className = 'mt-3 text-center alert alert-success';
            msg.innerText = '報名成功！我們將盡快聯繫您。';
            form.reset();
            btn.disabled = false;
            btn.innerText = '提交報名';
        })
        .catch(error => {
            console.error('Error!', error.message);
            msg.style.display = 'block';
            msg.className = 'mt-3 text-center alert alert-danger';
            msg.innerText = '報名失敗，請稍後再試。';
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
