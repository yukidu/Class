<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上課程報名系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 50px 0; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 form-container">
            <h2 class="text-center mb-4">課程報名表單</h2>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">電子郵件</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">聯絡電話</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">選擇課程</label>
                    <select name="course" class="form-select" required>
                        <option value="">請選擇課程...</option>
                        <option value="Python程式設計">Python 程式設計</option>
                        <option value="數位行銷入門">數位行銷入門</option>
                        <option value="平面設計基礎">平面設計基礎</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">備註</label>
                    <textarea name="note" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">提交報名</button>
            </form>
            <div id="responseMsg" class="mt-3 text-center" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxY-7nN1VstyU25aZ_9i8v1zBTRJJSWMa3z7HNSExJlBLcninn85MSHKLFeLyDL_lCT/exec';
    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMsg');

    form.addEventListener('submit', e => {
        e.preventDefault();

        // --- 核心優化：立即執行 UI 變化 ---
        msg.style.display = 'block';
        msg.className = 'mt-3 text-center alert alert-success';
        msg.innerText = '報名成功！我們將盡快聯繫您。'; // 讓使用者以為已經好了
        
        btn.disabled = true;
        btn.innerText = '已送出';

        // 取得資料
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // 清空表單欄位（讓使用者覺得流程已結束）
        form.reset();

        // --- 背景發送資料（不使用 .then 等待回報） ---
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // 使用 no-cors 可以避開繁瑣的跨網域檢查，速度最快
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        })
        .catch(error => {
            // 萬一真的失敗，只有在後台 console 報錯，不干擾使用者
            console.error('背景傳輸錯誤:', error);
        });
    });
</script>

</body>
</html>
