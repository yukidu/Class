<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程報名表單</title>
    <!-- 引入 Bootstrap 美化介面 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 40px 0; font-family: "Microsoft JhengHei", sans-serif; }
        .form-container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 550px;
            margin: auto;
        }
        h2 { font-weight: bold; color: #333; margin-bottom: 30px; }
        .form-label { font-weight: 600; color: #555; }
        .form-control, .form-select {
            background-color: #f0f4ff;
            border: none;
            height: 50px;
            border-radius: 10px;
        }
        textarea.form-control { height: auto; }
        .btn-submit {
            background-color: #7d97ff;
            border: none;
            height: 50px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #5b76e6; }
        .alert-success {
            background-color: #d1e7dd;
            border: none;
            color: #0f5132;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center">課程報名表單</h2>
        
        <form id="regForm">
            <div class="mb-3">
                <label class="form-label">姓名</label>
                <input type="text" name="name" class="form-control" placeholder="請輸入姓名" required>
            </div>

            <div class="mb-3">
                <label class="form-label">電子郵件</label>
                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">聯絡電話</label>
                <input type="tel" name="phone" class="form-control" placeholder="請輸入手機號碼" required>
            </div>

            <div class="mb-3">
                <label class="form-label">選擇課程</label>
                <select name="course" id="courseSelect" class="form-select" required>
                    <option value="">正在載入最新課程清單...</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">備註</label>
                <textarea name="note" class="form-control" rows="3" placeholder="如有其他需求請註明"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-submit" id="submitBtn">提交報名</button>
        </form>

        <!-- 成功訊息（預設隱藏） -->
        <div id="responseMsg" class="mt-4 text-center alert alert-success" style="display:none;">
            報名成功！我們將盡快聯繫您。
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxY-7nN1VstyU25aZ_9i8v1zBTRJJSWMa3z7HNSExJlBLcninn85MSHKLFeLyDL_lCT/exec'; 

    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMsg');
    const courseSelect = document.getElementById('courseSelect');

    // 1. 頁面載入時，抓取「課程清單」
    window.onload = function() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(courses => {
                courseSelect.innerHTML = '<option value="">請選擇課程...</option>';
                courses.forEach(course => {
                    let opt = document.createElement('option');
                    opt.value = course;
                    opt.innerText = course;
                    courseSelect.appendChild(opt);
                });
            })
            .catch(err => {
                courseSelect.innerHTML = '<option value="">課程載入失敗，請重新整理</option>';
            });
    };

    // 2. 提交表單（優化版：支援連續報名）
    form.addEventListener('submit', e => {
        e.preventDefault();

        // --- 顯示成功回饋 ---
        msg.style.display = 'block';
        btn.disabled = true; // 暫時鎖定避免重複點擊
        btn.innerText = '傳送中...';

        // 整理資料
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // --- 背景發送資料 ---
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        });

        // --- 關鍵修改：重置機制 ---
        setTimeout(() => {
            form.reset(); // 清空欄位
            btn.innerText = '提交報名'; // 恢復按鈕文字
            btn.disabled = false; // 恢復按鈕功能，允許第二次報名
        }, 1500); // 1.5 秒後按鈕恢復

        // 成功訊息顯示 5 秒後自動消失 (選擇性)
        setTimeout(() => {
            msg.style.display = 'none';
        }, 5000);
    });
</script>

</body>
</html>
