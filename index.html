<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上課程報名系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 50px 0; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 form-container">
            <h2 class="text-center mb-4">課程報名表單</h2>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">電子郵件</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">聯絡電話</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">選擇課程</label>
                    <select id="courseSelect" name="course" class="form-select" required>
                        <option value="">請選擇課程...</option>
                        <option value="Python程式設計">Python 程式設計</option>
                        <option value="數位行銷入門">數位行銷入門</option>
                        <option value="平面設計基礎">平面設計基礎</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">備註</label>
                    <textarea name="note" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">提交報名</button>
            </form>
            <div id="responseMsg" class="mt-3 text-center" style="display:none;"></div>
        </div>
    </div>
</div>

<!-- 下拉選單部分 -->
<div class="mb-3">
    <label class="form-label">選擇課程</label>
    <select name="course" id="courseSelect" class="form-select" required>
        <option value="">正在載入最新課程...</option>
    </select>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxY-7nN1VstyU25aZ_9i8v1zBTRJJSWMa3z7HNSExJlBLcninn85MSHKLFeLyDL_lCT/exec'; // 👈 這裡貼上你的 Web App URL
    const courseSelect = document.getElementById('courseSelect');

    // --- 新增：網頁載入時自動抓取課程清單 ---
    window.onload = function() {
        fetch(scriptURL) // doGet 會被觸發
            .then(response => response.json())
            .then(courses => {
                // 清空原本的「載入中」選項
                courseSelect.innerHTML = '<option value="">請選擇課程...</option>';
                
                // 將抓到的課程填入下拉選單
                courses.forEach(course => {
                    let opt = document.createElement('option');
                    opt.value = course;
                    opt.innerHTML = course;
                    courseSelect.appendChild(opt);
                });
            })
            .catch(error => {
                courseSelect.innerHTML = '<option value="">載入失敗，請重新整理</option>';
                console.error('抓取課程錯誤:', error);
            });
    };

    // --- 原本的提交功能 (維持不變) ---
    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMsg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        msg.style.display = 'block';
        msg.className = 'mt-3 text-center alert alert-success';
        msg.innerText = '報名成功！我們將盡快聯繫您。';
        btn.disabled = true;
        btn.innerText = '已送出';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        form.reset();

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        });
    });
</script>
</body>
</html>
